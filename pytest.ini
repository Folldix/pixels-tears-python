[pytest]
# Реєстрація маркерів (вимога pytest >= 7)
markers =
    unit: швидкі unit-тести без I/O
    slow: повільні тести (пропускати з -m "not slow")
    integration: тести з реальними файлами

# Репортинг
addopts =
    -v
    --tb=short
    --html=reports/test_report.html
    --self-contained-html

# Мінімальна версія pytest
minversion = 7.0

# Де шукати тести
testpaths = .

# Ігноруємо папки
norecursedirs = .git __pycache__ .venv venv node_modules
