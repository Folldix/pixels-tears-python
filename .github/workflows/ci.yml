name: CI — Test & Lint

on:
  push:
    branches: ["**"]        # кожен push у будь-яку гілку
  pull_request:
    branches: [master, main]

jobs:
  test-and-lint:
    name: Python ${{ matrix.python-version }} | ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        os: [ubuntu-latest]

    steps:
      # ── 1. Код ───────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # ── 3. Системні залежності для pygame (headless) ─────────────
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            python3-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libfreetype6-dev libportmidi-dev \
            xvfb

      # ── 4. Python-залежності ──────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 5. Папка для звітів ───────────────────────────────────────
      - name: Create reports directory
        run: mkdir -p reports/flake8

      # ── 6. Лінтінг (Flake8) ──────────────────────────────────────
      - name: Lint with Flake8 (text output)
        run: |
          flake8 game/ --format=default --tee --output-file=reports/flake8/flake8.txt || true

      - name: Lint with Flake8 (HTML report)
        run: |
          flake8 game/ --format=html --htmldir=reports/flake8 || true

      # ── 7. Тести (Pytest) ─────────────────────────────────────────
      - name: Run tests with Pytest
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: |
          xvfb-run -a python -m pytest \
            --html=reports/test_report.html \
            --self-contained-html \
            --cov=game \
            --cov-report=html:reports/coverage \
            --cov-report=term-missing \
            -v

      # ── 8. Завантаження HTML-звітів як артефактів ─────────────────
      - name: Upload test report
        if: always()          # завантажувати навіть якщо тести впали
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ matrix.python-version }}
          path: reports/test_report.html
          retention-days: 30

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: reports/coverage/
          retention-days: 30

      - name: Upload flake8 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flake8-report-${{ matrix.python-version }}
          path: reports/flake8/
          retention-days: 30

      # ── 9. Підсумок у Pull Request ────────────────────────────────
      - name: Test summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: all-reports-${{ matrix.python-version }}
          path: reports/
          retention-days: 30
